# ─── Conduit Monorepo — Full-Stack Docker Compose ───────────────────────────────
# Services:
#   proxy   – Nginx reverse proxy (port 80) applying Strangler Fig routing
#   modern  – Angular 21 app served by Nginx (port 4200 → host:4200)
#   legacy  – AngularJS app via gulp + BrowserSync on Node 10 (port 4201 → host:4201)
#
# Usage:
#   docker compose up --build          # start everything
#   docker compose up legacy --build   # legacy only
#   docker compose up modern --build   # modern only
# ────────────────────────────────────────────────────────────────────────────────

services:

  # ── Legacy AngularJS app (Node 10 inside Docker) ──────────────────────────────
  legacy:
    build:
      context: ./apps/legacy
      dockerfile: Dockerfile
    image: conduit-legacy:local
    container_name: conduit-legacy
    ports:
      - "4201:4201"
    networks:
      - conduit-net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:4201',function(r){process.exit(r.statusCode<400?0:1)}).on('error',function(){process.exit(1)})\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  # ── Modern Angular 21 app (Nginx serving built output) ────────────────────────
  modern:
    build:
      context: .
      dockerfile: apps/modern/Dockerfile
    image: conduit-modern:local
    container_name: conduit-modern
    ports:
      - "4200:80"
    networks:
      - conduit-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Strangler Fig proxy (public entry point on port 80) ────────────────────────
  proxy:
    image: nginx:1.27-alpine
    container_name: conduit-proxy
    ports:
      - "80:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - conduit-net
    depends_on:
      legacy:
        condition: service_healthy
      modern:
        condition: service_healthy
    restart: unless-stopped

networks:
  conduit-net:
    driver: bridge
