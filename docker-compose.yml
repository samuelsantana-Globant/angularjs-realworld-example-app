version: "3.9"

# ─── Conduit Monorepo — Full-Stack Docker Compose ───────────────────────────────
# Services:
#   proxy   – Nginx reverse proxy (port 80) applying Strangler Fig routing
#   modern  – Angular 21 app served by Nginx (port 4200, internal only)
#   legacy  – AngularJS app via gulp + BrowserSync on Node 10 (port 4201, internal only)
#
# Usage:
#   docker compose up --build          # start everything
#   docker compose up legacy --build   # legacy only
#   docker compose up modern --build   # modern only
# ────────────────────────────────────────────────────────────────────────────────

services:

  # ── Legacy AngularJS app (Node 10 inside Docker) ──────────────────────────────
  legacy:
    build:
      context: ./apps/legacy
      dockerfile: Dockerfile
    image: conduit-legacy:local
    container_name: conduit-legacy
    expose:
      - "4201"
    networks:
      - conduit-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4201"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Modern Angular 21 app (Nginx serving built output) ────────────────────────
  modern:
    build:
      context: .
      dockerfile: apps/modern/Dockerfile
    image: conduit-modern:local
    container_name: conduit-modern
    expose:
      - "4200"
    networks:
      - conduit-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4200"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Strangler Fig proxy (public entry point on port 80) ────────────────────────
  proxy:
    image: nginx:1.27-alpine
    container_name: conduit-proxy
    ports:
      - "80:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - conduit-net
    depends_on:
      legacy:
        condition: service_healthy
      modern:
        condition: service_healthy
    restart: unless-stopped

networks:
  conduit-net:
    driver: bridge
