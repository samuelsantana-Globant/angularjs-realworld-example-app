# Strangler Fig reverse proxy
# Routes migrated routes → modern Angular 21 (port 4200)
# Everything else → legacy AngularJS (port 4201)

upstream modern {
    server modern:4200;
}

upstream legacy {
    server legacy:4201;
}

server {
    listen 80;
    server_name localhost;

    # ─── Migrated routes → Angular 21 ───────────────────────────────────────────
    # Add new location blocks here as pages are migrated from legacy to modern.
    # Example (uncomment when /home is migrated):
    # location = / {
    #     proxy_pass http://modern;
    # }

    # ─── Legacy catch-all → AngularJS ───────────────────────────────────────────
    location / {
        proxy_pass         http://legacy;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
